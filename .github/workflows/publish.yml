name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: abwuge-openclaw-loop-watchdog
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Publish
        run: |
          echo 'registry=https://registry.npmjs.org' > ~/.npmrc
          npm publish --provenance --access public
